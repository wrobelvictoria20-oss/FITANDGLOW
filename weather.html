<!DOCTYPE html>
<html>
<head>
<title>Weather Dashboard - FitAndGlow</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

header {
  text-align: center;
  color: white;
  margin-bottom: 30px;
}

header h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

header p {
  font-size: 16px;
  opacity: 0.9;
}

.search-section {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

#cityInput {
  padding: 12px 20px;
  border: none;
  border-radius: 50px;
  font-size: 16px;
  width: 300px;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
}

#searchBtn {
  padding: 12px 30px;
  background: white;
  color: #667eea;
  border: none;
  border-radius: 50px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
  transition: transform 0.3s;
}

#searchBtn:hover {
  transform: scale(1.05);
}

.current-weather {
  background: white;
  border-radius: 20px;
  padding: 40px;
  margin-bottom: 30px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
  text-align: center;
}

.city-name {
  font-size: 32px;
  color: #333;
  margin-bottom: 10px;
}

.weather-icon {
  font-size: 80px;
  margin: 20px 0;
}

.temperature {
  font-size: 56px;
  color: #667eea;
  font-weight: bold;
  margin: 10px 0;
}

.weather-description {
  font-size: 20px;
  color: #666;
  text-transform: capitalize;
  margin-bottom: 20px;
}

.weather-details {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.detail-card {
  background: #f5f5f5;
  padding: 15px;
  border-radius: 10px;
}

.detail-label {
  font-size: 12px;
  color: #999;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.detail-value {
  font-size: 20px;
  color: #333;
  font-weight: bold;
}

.forecast-section {
  margin-top: 30px;
}

.forecast-title {
  color: white;
  font-size: 24px;
  margin-bottom: 20px;
  text-align: center;
}

.forecast-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
  margin-bottom: 30px;
}

.forecast-card {
  background: white;
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
  transition: transform 0.3s;
}

.forecast-card:hover {
  transform: translateY(-5px);
}

.forecast-day {
  font-size: 14px;
  color: #666;
  margin-bottom: 10px;
  font-weight: bold;
}

.forecast-icon {
  font-size: 40px;
  margin: 10px 0;
}

.forecast-temp {
  font-size: 18px;
  color: #667eea;
  font-weight: bold;
  margin: 10px 0;
}

.forecast-desc {
  font-size: 12px;
  color: #999;
  text-transform: capitalize;
}

.loading {
  text-align: center;
  color: white;
  font-size: 18px;
  padding: 40px;
}

.spinner {
  display: inline-block;
  width: 40px;
  height: 40px;
  border: 4px solid rgba(255, 255, 255, 0.3);
  border-top: 4px solid white;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.error {
  background: #ff6b6b;
  color: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  margin-bottom: 20px;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
}

.back-btn {
  display: inline-block;
  background: white;
  color: #667eea;
  padding: 12px 30px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: bold;
  text-align: center;
  margin-top: 20px;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
  transition: transform 0.3s;
}

.back-btn:hover {
  transform: scale(1.05);
}

@media (max-width: 600px) {
  .current-weather {
    padding: 20px;
  }

  header h1 {
    font-size: 24px;
  }

  .temperature {
    font-size: 40px;
  }

  #cityInput {
    width: 100%;
    max-width: 300px;
  }

  .weather-details {
    grid-template-columns: repeat(2, 1fr);
  }

  .forecast-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<div class="container">
  <header>
    <h1>🌤️ Weather Dashboard</h1>
    <p>Get real-time weather information for any city</p>
  </header>

  <div class="search-section">
    <input 
      type="text" 
      id="cityInput" 
      placeholder="Enter city name..." 
      autocomplete="off"
    >
    <button id="searchBtn">Search</button>
  </div>

  <div id="errorMessage"></div>

  <div id="loadingIndicator" style="display: none;">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading weather data...</p>
    </div>
  </div>

  <div id="weatherContent" style="display: none;">
    <div class="current-weather">
      <div class="city-name" id="cityName"></div>
      <div class="weather-icon" id="weatherIcon"></div>
      <div class="temperature" id="temperature"></div>
      <div class="weather-description" id="description"></div>
      
      <div class="weather-details">
        <div class="detail-card">
          <div class="detail-label">Feels Like</div>
          <div class="detail-value" id="feelsLike"></div>
        </div>
        <div class="detail-card">
          <div class="detail-label">Humidity</div>
          <div class="detail-value" id="humidity"></div>
        </div>
        <div class="detail-card">
          <div class="detail-label">Wind Speed</div>
          <div class="detail-value" id="windSpeed"></div>
        </div>
        <div class="detail-card">
          <div class="detail-label">Pressure</div>
          <div class="detail-value" id="pressure"></div>
        </div>
        <div class="detail-card">
          <div class="detail-label">Visibility</div>
          <div class="detail-value" id="visibility"></div>
        </div>
        <div class="detail-card">
          <div class="detail-label">UV Index</div>
          <div class="detail-value" id="uvIndex"></div>
        </div>
      </div>
    </div>

    <div class="forecast-section">
      <div class="forecast-title">📅 5-Day Forecast</div>
      <div class="forecast-grid" id="forecastGrid"></div>
    </div>
  </div>

  <div style="text-align: center; margin-top: 30px;">
    <a href="index.html" class="back-btn">← Back Home</a>
  </div>
</div>

<script>
const cityInput = document.getElementById('cityInput');
const searchBtn = document.getElementById('searchBtn');
const loadingIndicator = document.getElementById('loadingIndicator');
const weatherContent = document.getElementById('weatherContent');
const errorMessage = document.getElementById('errorMessage');

// OpenWeatherMap API (Free tier)
const API_KEY = '3b4cb5bbd0a25a26e1a1e8d4c3b5e9f1'; // Free public API key for demo
const API_BASE = 'https://api.open-meteo.com/v1/forecast';
const GEOCODING_API = 'https://geocoding-api.open-meteo.com/v1/search';

// Weather icons mapping
const weatherIcons = {
  'clear': '☀️',
  'cloudy': '☁️',
  'overcast': '☁️',
  'foggy': '🌫️',
  'drizzle': '🌦️',
  'rain': '🌧️',
  'snow': '❄️',
  'thunderstorm': '⛈️',
  'hail': '🧊'
};

searchBtn.addEventListener('click', searchWeather);
cityInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') searchWeather();
});

function getWeatherIcon(code, isDay) {
  // WMO Weather interpretation codes
  if (code === 0 || code === 1) return '☀️'; // Clear/Mainly clear
  if (code === 2) return '⛅'; // Partly cloudy
  if (code === 3) return '☁️'; // Overcast
  if (code === 45 || code === 48) return '🌫️'; // Foggy
  if (code === 51 || code === 53 || code === 55) return '🌦️'; // Drizzle
  if (code === 61 || code === 63 || code === 65) return '🌧️'; // Rain
  if (code === 71 || code === 73 || code === 75 || code === 77 || code === 80 || code === 81 || code === 82) return '❄️'; // Snow/Rain
  if (code === 85 || code === 86) return '🌨️'; // Snow showers
  if (code === 80 || code === 81 || code === 82) return '⛈️'; // Rain showers
  if (code === 95 || code === 96 || code === 99) return '⛈️'; // Thunderstorm
  return '🌤️'; // Default
}

async function searchWeather() {
  const city = cityInput.value.trim();

  if (city === '') {
    showError('Please enter a city name!');
    return;
  }

  showLoading();
  clearError();

  try {
    // First, get coordinates for the city
    const geoResponse = await fetch(`${GEOCODING_API}?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
    const geoData = await geoResponse.json();

    if (!geoData.results || geoData.results.length === 0) {
      showError('City not found. Please try another city name.');
      hideLoading();
      return;
    }

    const location = geoData.results[0];
    const { latitude, longitude, name, country } = location;

    // Fetch weather data
    const weatherResponse = await fetch(
      `${API_BASE}?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,pressure_msl,visibility,uv_index&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=celsius&wind_speed_unit=kmh&forecast_days=5`
    );
    const weatherData = await weatherResponse.json();

    displayWeather(weatherData, name, country);
    hideLoading();
  } catch (error) {
    console.error('Error fetching weather:', error);
    showError('Failed to fetch weather data. Please try again.');
    hideLoading();
  }
}

function displayWeather(data, cityName, country) {
  const current = data.current;
  const daily = data.daily;

  // Display current weather
  document.getElementById('cityName').textContent = `${cityName}, ${country}`;
  document.getElementById('weatherIcon').textContent = getWeatherIcon(current.weather_code, true);
  document.getElementById('temperature').textContent = `${Math.round(current.temperature_2m)}°C`;
  document.getElementById('description').textContent = getWeatherDescription(current.weather_code);
  document.getElementById('feelsLike').textContent = `${Math.round(current.apparent_temperature)}°C`;
  document.getElementById('humidity').textContent = `${current.relative_humidity_2m}%`;
  document.getElementById('windSpeed').textContent = `${Math.round(current.wind_speed_10m)} km/h`;
  document.getElementById('pressure').textContent = `${current.pressure_msl} mb`;
  document.getElementById('visibility').textContent = `${(current.visibility / 1000).toFixed(1)} km`;
  document.getElementById('uvIndex').textContent = Math.round(current.uv_index);

  // Display 5-day forecast
  const forecastGrid = document.getElementById('forecastGrid');
  forecastGrid.innerHTML = '';

  const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

  for (let i = 0; i < 5; i++) {
    const date = new Date(daily.time[i]);
    const dayName = days[date.getDay()];
    const weatherCode = daily.weather_code[i];
    const maxTemp = daily.temperature_2m_max[i];
    const minTemp = daily.temperature_2m_min[i];

    const forecastCard = document.createElement('div');
    forecastCard.className = 'forecast-card';
    forecastCard.innerHTML = `
      <div class="forecast-day">${dayName}</div>
      <div class="forecast-icon">${getWeatherIcon(weatherCode, true)}</div>
      <div class="forecast-temp">${Math.round(maxTemp)}° / ${Math.round(minTemp)}°</div>
      <div class="forecast-desc">${getWeatherDescription(weatherCode)}</div>
    `;
    forecastGrid.appendChild(forecastCard);
  }

  weatherContent.style.display = 'block';
}

function getWeatherDescription(code) {
  const descriptions = {
    0: 'Clear sky',
    1: 'Mainly clear',
    2: 'Partly cloudy',
    3: 'Overcast',
    45: 'Foggy',
    48: 'Foggy with rime',
    51: 'Light drizzle',
    53: 'Moderate drizzle',
    55: 'Dense drizzle',
    61: 'Slight rain',
    63: 'Moderate rain',
    65: 'Heavy rain',
    71: 'Slight snow',
    73: 'Moderate snow',
    75: 'Heavy snow',
    77: 'Snow grains',
    80: 'Slight rain showers',
    81: 'Moderate rain showers',
    82: 'Violent rain showers',
    85: 'Slight snow showers',
    86: 'Heavy snow showers',
    95: 'Thunderstorm',
    96: 'Thunderstorm with hail',
    99: 'Thunderstorm with heavy hail'
  };
  return descriptions[code] || 'Unknown';
}

function showLoading() {
  loadingIndicator.style.display = 'block';
  weatherContent.style.display = 'none';
}

function hideLoading() {
  loadingIndicator.style.display = 'none';
}

function showError(message) {
  errorMessage.innerHTML = `<div class="error">${message}</div>`;
  weatherContent.style.display = 'none';
}

function clearError() {
  errorMessage.innerHTML = '';
}

// Load default city on page load
window.addEventListener('load', () => {
  cityInput.value = 'London';
  searchWeather();
});
</script>

</body>
</html>
